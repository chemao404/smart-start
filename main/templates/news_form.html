{% extends 'index.html' %}

{% block content %}
<head>
    <title>{% if object %}Редактировать{% else %}Создать{% endif %} новость</title>
</head>
    <div class="card-all-in">
    <h1>{% if object %}Редактировать{% else %}Создать{% endif %} новость</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>

    <a href="{% url 'main:news_list' %}">Отмена</a>
    </div>
{% endblock %}
