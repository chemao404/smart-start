{% extends 'index.html' %}

{% block content %}
<head>
    <title>Удаление новости</title>
</head>
    <div class="card-all-in">
    <h1>Удаление новости</h1>

    <p>Вы уверены, что хотите удалить новость "{{ new.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'main:news_detail' new.pk %}">Отмена</a>
    </form>
    </div>
    {% endblock %}
